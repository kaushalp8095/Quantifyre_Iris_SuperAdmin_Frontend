<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantifyre Iris - Super Admin Login</title>
    <link rel="stylesheet" href="css/admin_style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body class="al-body">

    <div class="al-login-card">
        <div class="al-logo-section">
            <img src="Images/quantifirelogo.png" alt="Quantifyre Iris Logo" class="al-logo">
        </div>

        <h2 class="al-form-title">Super Admin Login</h2>

        <form action="#">
            <div class="al-input-group">
                <label for="admin_email">Email Id</label>
                <div class="al-input-wrapper">
                    <input type="email" id="admin_email" placeholder="Enter Your Email" required>
                    <i class="fa-regular fa-envelope al-input-icon"></i>
                </div>
            </div>

            <div class="al-input-group">
                <label for="admin_password">Password</label>
                <div class="al-input-wrapper">
                    <input type="password" id="admin_password" placeholder="Enter Your Password" required>
                    <i class="fa-regular fa-eye al-input-icon" id="toggleAdminEye"
                        style="cursor: pointer; z-index: 10;"></i>
                </div>
                <p id="loginError" class="error-text"></p>
            </div>

            <button type="button" class="al-login-btn" id="adminLoginBtn">Login</button>
        </form>
    </div>

    <script src="Js/jquery-3.7.1.min.js"></script>
    <script>


        $(document).ready(function () {

            const isAdminLoggedIn = localStorage.getItem('isAdminLoggedIn');
            const adminId = localStorage.getItem('adminId');

            // 🔴 REDIRECT CHECK (Only if Server is UP)
            if (isAdminLoggedIn === 'true' && adminId) {
                // Dashboard bhejne se pehle check karo server chalu hai ya nahi
                fetch(`https://quantifyre-iris-superadmin-backend.onrender.com/api/admin/settings/profile/${adminId}`)
                    .then(res => {
                        if (res.ok) window.location.replace("AdminDashboard.html");
                    })
                    .catch(() => {
                        console.warn("Server Down: Staying on Login page to prevent loop.");
                        // Agar server down hai toh hum yahi rukenge, redirect nahi karenge
                    });
            }


            // Password Eye Toggle
            $('#toggleAdminEye').click(function () {
                var passwordField = $('#admin_password');
                var icon = $(this);
                var type = passwordField.attr('type') === 'password' ? 'text' : 'password';
                passwordField.attr('type', type);

                if (type === 'text') {
                    icon.removeClass('fa-eye').addClass('fa-eye-slash');
                } else {
                    icon.removeClass('fa-eye-slash').addClass('fa-eye');
                }
            });

            // 🔴 Real Login AJAX Logic
            $("#adminLoginBtn").click(function (e) {
                e.preventDefault();
                var emailField = $("#admin_email");
                var passwordField = $("#admin_password");
                var errorBox = $("#loginError");

                var email = emailField.val().trim();
                var password = passwordField.val().trim();
                var $btn = $(this);

                // Reset Errors (Removed class removal here)
                errorBox.hide().text("");

                // Empty Checks
                if (email === "") {
                    errorBox.text("Email is required.").show();
                    return;
                }
                if (password === "") {
                    errorBox.text("Password is required.").show();
                    return;
                }

                // Email Format Check
                var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    errorBox.text("Invalid Credentials!").show();
                    return;
                }

                $btn.text("Verifying...").prop("disabled", true);

                $.ajax({
                    url: 'https://quantifyre-iris-superadmin-backend.onrender.com/api/admin/login',
                    type: 'POST',
                    contentType: 'application/json',
                    xhrFields: {
                        withCredentials: true
                    },
                    data: JSON.stringify({
                        email: email,
                        password: password
                    }),
                    success: function (response) {
                        if (response.status === "success") {
                            localStorage.setItem('isAdminLoggedIn', 'true');
                            localStorage.setItem('adminId', response.adminId);
                            localStorage.setItem('adminName', response.name);
                            localStorage.setItem('adminLogo', response.profileLogo);
                            localStorage.setItem("adminEmail", response.email);

                            localStorage.setItem('loginTime', new Date().getTime());

                            $btn.text("Login Successful!");

                            setTimeout(function () {
                                window.location.href = "AdminDashboard.html";
                            }, 500);
                        }
                    },
                    error: function (xhr) {
                        let errorMessage = "*Invalid Credentials!";
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            errorMessage = xhr.responseJSON.message;
                        }

                        // Show error below form only
                        errorBox.text(errorMessage).show();

                        $btn.text("Login").prop("disabled", false);
                    }
                });
            });

            // 🔴 Clear error when user starts typing again
            $("input").on("input", function () {
                $("#loginError").hide();
            });

        });
    </script>
</body>

</html>
